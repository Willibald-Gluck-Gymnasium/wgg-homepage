  // Question.js
  function Question(questionText, scoreProcessingFunction) {
    let question = {
      text: questionText,
      scoreProcessingFunction: scoreProcessingFunction,
      processScores: (cars) => {
        for (let c = 0; c < cars.length; c++) {
          question.scoreProcessingFunction(question, cars[c]);
        }
      }
    };
    return question;
  }

  function QuestionRangeSlider(questionText, valMin, valMinLabel, valMax, valMaxLabel, steps, resultAppendedLabel, scoreProcessingFunction) {
    let question = Question(questionText, scoreProcessingFunction);
    // question.valMin = valMin;
    // question.valMax = valMax;
    // question.steps = steps;

    question.sliderDOM = document.createElement("INPUT");
    question.sliderDOM.type = "range";
    question.sliderDOM.className = "input-range-slider";
    question.sliderDOM.min = 0;
    question.sliderDOM.max = steps;
    question.sliderDOM.value = Math.floor(steps / 2);
    question.sliderDOM.oninput = () => {
      question.updateCurrentValueDOM();
    }

    question.currentValueDOM = document.createElement("SPAN");
    question.currentValueDOM.className = "input-range-slide-current-value";
    question.currentValueDOM.innerHTML = "CURRENT_VALUE_DOM";

    question.getValue = () => {
      let percentage = (question.sliderDOM.value - question.sliderDOM.min) / (question.sliderDOM.max - question.sliderDOM.min);
      return (percentage * (valMax - valMin)) + valMin;
    };
    question.getValueLabeled = () => {
      return question.getValue() + resultAppendedLabel;
    };
    question.updateCurrentValueDOM = () => {
      question.currentValueDOM.innerHTML = question.getValueLabeled();
      let percentage = (question.sliderDOM.value - question.sliderDOM.min) / (question.sliderDOM.max - question.sliderDOM.min);
      percentage += (0.5 - percentage) * 0.03
      // percentage *= 1 + (percentage<0.5? 0.001/(percentage+0.01) : -0.01);
      question.currentValueDOM.style.left = (percentage * 100) + "%";
    }
    question.generateDOM = () => {
      let dom = document.getElementById("blueprint-question-input-range-slider").cloneNode(true);
      dom.id = ""; //prevent having multiple doms with same id
      dom.style.display = "";

      //print static values to it
      dom.innerHTML = dom.innerHTML.replace("QUESTION_TITLE", questionText);
      dom.innerHTML = dom.innerHTML.replace("VALUE_MINIMUM", valMinLabel);
      dom.innerHTML = dom.innerHTML.replace("VALUE_MAXIMUM", valMaxLabel);


      //find question body
      let questionBodyDOM;
      for (let i = 0; i < dom.childNodes.length; i++) {
        if (dom.childNodes[i].className === "question-body") {
          questionBodyDOM = dom.childNodes[i];
          break;
        }
      }
      if (questionBodyDOM == undefined) {
        console.err("Could not find DOM of class 'question-body' in cloned question blueprint (QuestionRangeSlider)");
      } else {

        //find question-input-range-slider-slider-container
        let sliderContainerDOM;
        for (let i = 0; i < questionBodyDOM.childNodes.length; i++) {
          if (questionBodyDOM.childNodes[i].className === "question-input-range-slider-slider-container") {
            sliderContainerDOM = questionBodyDOM.childNodes[i];
            break;
          }
        }




        sliderContainerDOM.appendChild(question.sliderDOM);
        sliderContainerDOM.appendChild(question.currentValueDOM);
      }
      return dom;
    };

    question.updateCurrentValueDOM();
    return question;
  }

  function QuestionMultipleChoice(questionText, choicesArray, scoreProcessingFunction, isRadioGroup) {
    let question = Question(questionText, scoreProcessingFunction);

    // let questionElementDOM_BLUEPRINT = document.getElementById("blueprint-question-multiple-choice-element");
    // for(let e = 0; e < choicesArray.length; e++) {
    //   let questionElementDOM = questionElementDOM_BLUEPRINT.cloneNode(true);
    //   questionElementDOM.id = "";
    //   questionElementDOM.style.display = "";
    //   questionElementDOM.innerHTML = questionElementDOM.innerHTML.replace("ELEMENT_TEXT", choicesArray[e]);
    //
    //   question.choices.push({
    //     text: choicesArray[e],
    //     dom: questionElementDOM
    //   });
    // }

    question.generateDOM = (questionId) => {
      let dom = document.getElementById("blueprint-question-multiple-choice").cloneNode(true);
      dom.id = "";
      dom.style.display = "";
      dom.innerHTML = dom.innerHTML.replace("QUESTION_TITLE", questionText);

      //Get the question body DOM
      let questionBodyDOM;
      for (let i = 0; i < dom.childNodes.length; i++) {
        if (dom.childNodes[i].className === "question-body") {
          questionBodyDOM = dom.childNodes[i];
          break;
        }
      }
      if (questionBodyDOM == undefined) {
        console.err("Could not find DOM of class 'question-body' in cloned question blueprint (QuestionMultipleChoice)");
      } else {

        let questionElementDOM_BLUEPRINT = isRadioGroup === true ?
          document.getElementById("blueprint-question-multiple-choice-radio-element")
          :
          document.getElementById("blueprint-question-multiple-choice-element")
          ;

        for (let e = 0; e < choicesArray.length; e++) {
          let questionElementDOM = questionElementDOM_BLUEPRINT.cloneNode(true);
          questionElementDOM.id = "";
          questionElementDOM.style.display = "";
          questionElementDOM.innerHTML = questionElementDOM.innerHTML.replace("ELEMENT_TEXT", choicesArray[e]);
          //replace placeholder of <input> element
          questionElementDOM.innerHTML = questionElementDOM.innerHTML.replace("QUESTION_ID", questionId);
          questionElementDOM.innerHTML = questionElementDOM.innerHTML.replace("ELEMENT_ID", e);
          //replace attributes of the <label> element itself (not via .innerHTML possible)
          questionElementDOM.setAttribute("for", "checkbox-" + questionId + "-" + e);

          questionBodyDOM.appendChild(questionElementDOM);
        }
      }
      return dom;
    }

    return question;
  }

  function generateResultsDOM(carsSorted) {
    let resultsContainer = document.getElementById("results-container");
    //resultsContainer.innerHTML = "<div style='font-size:1.1em;margin-bottom:7px'>Durch Klick auf ein Ergebnis erhalten Sie zusätzliche Informationen</div>";

    let rowBlueprint = document.getElementById("blueprint-result-row");

    // let highestScore = carsSorted[0].score;
    let highestScore = questionArray.length - 1; //(-1 due to one question not adding, but only subtracting from the score)

    let carsDisplayed = 0;
    for (let c = 0; c < carsSorted.length /* && carsDisplayed < 5*/; c++) {
      if (carsSorted[c].wasExcluded)
        continue;

      let rowDOM = rowBlueprint.cloneNode(true);
      rowDOM.id = "";
      rowDOM.style.display = "";

      // console.log(rowDOM.innerHTML);
      let percentage = carsSorted[c].score / highestScore;
      rowDOM.innerHTML = rowDOM.innerHTML
        .replace("PERCENTAGE", (Math.floor(percentage * 100)) + "")
        .replace("PERCENTAGE", (Math.floor(percentage * 100)) + "")
        .replace("CAR_NAME", carsSorted[c].data[0]);
      // console.log(rowDOM.innerHTML);

      //add result-infos
      // find container of all result-info elements and fill it with result-info elements
      rowDOM.childNodes.forEach(node => {
        if (node.className === "result-info-container")
          addResultInfosOfCarToContainer(node, carsSorted[c])
      }
      );


      resultsContainer.append(rowDOM);
      carsDisplayed++;
    }
  }

  function addResultInfosOfCarToContainer(container, car) {
    let resultInfoBlueprint = document.getElementById("blueprint-result-info");
    function cloneResultInfo(leftText, rightText, color) {
      let resultInfoDOM = resultInfoBlueprint.cloneNode(true);
      resultInfoDOM.id = "";
      resultInfoDOM.style.display = "";

      resultInfoDOM.innerHTML = leftText + ": " + rightText;
      if (color == "green") {
        resultInfoDOM.style["border-color"] = "green";
      } else if (color === "red") {
        resultInfoDOM.style["border-color"] = "#00000000"
        resultInfoDOM.style["background-color"] = "#99000044";
      } else {
        resultInfoDOM.style["border-color"] = "#00000000";
      }

      return resultInfoDOM;
    }

    //Antrieb
    let antrieb = car.data[1];
    let questionAntriebColor = "white";
    if (car.data[1].trim().toLowerCase() === "elektro" && document.getElementById("checkbox-" + QUESTION_ID_ANTRIEB + "-0").checked
      || car.data[1].trim().toLowerCase() === "benzin" && document.getElementById("checkbox-" + QUESTION_ID_ANTRIEB + "-1").checked
      || car.data[1].trim().toLowerCase() === "diesel" && document.getElementById("checkbox-" + QUESTION_ID_ANTRIEB + "-2").checked
      || car.data[1].trim().toLowerCase() === "hybrid" && document.getElementById("checkbox-" + QUESTION_ID_ANTRIEB + "-3").checked
    ) {
      questionAntriebColor = "green";
    }
    container.append(cloneResultInfo("Antrieb", antrieb.charAt(0).toUpperCase() + antrieb.slice(1), questionAntriebColor));

    container.append(document.createElement("BR"));

    //Reichweite
    let reichweite = toNumber(car.data[10]);
    container.append(cloneResultInfo("Reichweite", reichweite + " km", questionArray[QUESTION_ID_REICHWEITE].getValue() * 5 <= reichweite ? "green" : "red"));

    container.append(document.createElement("BR"));

    //Anschaffungskosten
    let price = toNumber(car.data[4]);
    // let priceString = price + " €";
    let priceString;
    if (price < 1000) {
      priceString = price + " €";
    } else {
      let firstPart = Math.floor(price / 1000) + ".";
      let latterPart = (price % 1000) + "";
      if (latterPart.length == 1) {
        latterPart = "00" + latterPart;
      } else if (latterPart.length == 2) {
        latterPart = "0" + latterPart;
      }
      priceString = firstPart + latterPart + " €";
    }
    container.append(cloneResultInfo("Anschaffungskosten", priceString, price < questionArray[QUESTION_ID_ANSCHAFFUNGSKOSTEN].getValue() ? "green" : "red"));

    container.append(document.createElement("BR"));

    //Sitze
    let seats = toNumber(car.data[13]);
    let seatsWanted;
    let seatsQuestionColor = "white";
    let qId = QUESTION_ID_SITZE;
    if (document.getElementById("checkbox-" + qId + "-0").checked) {
      seatsWanted = 4;
      if (car.data[13].trim().toLowerCase() === "4"
        || car.data[13].trim().toLowerCase() === "5") {
        seatsQuestionColor = "green";
      }
    }
    if (document.getElementById("checkbox-" + qId + "-1").checked) {
      seatsWanted = 5;
      if (car.data[13].trim().toLowerCase() === "5") {
        seatsQuestionColor = "green";
      }
    }
    if (document.getElementById("checkbox-" + qId + "-2").checked) {
      seatsWanted = 7;
      if (car.data[13].trim().toLowerCase() === "7"
        || car.data[13].trim().toLowerCase() === "9") {
        seatsQuestionColor = "green";
      }
    }
    if (seatsWanted != undefined && seats < seatsWanted)
      seatsQuestionColor = "red";
    container.append(cloneResultInfo("Sitze", seats, seatsQuestionColor));

    container.append(document.createElement("BR"));

    //PS
    let ps = toNumber(car.data[7]);
    container.append(cloneResultInfo("PS", ps, ps >= questionArray[QUESTION_ID_PS].getValue() ? "green" : "red"))
  }

    if (document.getElementById("checkbox-" + qId + "-1").checked && car.data[1].trim().toLowerCase() === "benzin") {

    if (document.getElementById("checkbox-" + qId + "-2").checked && car.data[1].trim().toLowerCase() === "diesel") {

    let reichweite = toNumber(car.data[10]);
    let delta = Math.min(
      (
        (
          (0.7)
          /
          (0.8 * reichweite)
        )
        * (question.getValue() * 5)
        + 0.3
      ), (
      (
        (-0.5)
        /
        (0.2 * reichweite)
      )
      * (question.getValue() * 5)
      + 3
    )
    );
    console.log(delta + ", " + car.data[0]);
    car.score += delta;
  });
  questionArray.push(q2);
  document.getElementById("content").appendChild(q2.generateDOM(QUESTION_ID_REICHWEITE));

    let eingabe = question.getValue();
    let anschaffungsKosten = toNumber(car.data[4]);

    if (eingabe >= anschaffungsKosten) {

    } else {
      car.score += 1 / (
        (
          (1.5 * anschaffungsKosten) - eingabe
        )
        /
        (
          0.5 * anschaffungsKosten
        )
      );
    }
    // console.log(car.score);
  });
